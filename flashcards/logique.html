<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcards Logique — L'Encyclopédie des Explorateurs</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#060a14;--gold:#d4a843;--gold-dim:rgba(200,180,120,0.18);--text:#e8dfc4;--text-dim:rgba(232,223,196,0.48);--card-bg:rgba(8,13,26,0.94);--border:rgba(200,180,120,0.18);--purple:#a87be8;--purple-dim:rgba(168,123,232,0.15);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',Georgia,serif;min-height:100vh;overflow-x:hidden;user-select:none;}
#stars-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.content{position:relative;z-index:1;}
.back{position:fixed;top:22px;left:24px;z-index:100;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(212,168,67,.5);text-decoration:none;display:flex;align-items:center;gap:8px;transition:color .2s;}
.back:hover{color:#d4a843;}
header{text-align:center;padding:52px 20px 28px;}
.enc-label{font-size:.72rem;letter-spacing:.38em;text-transform:uppercase;color:var(--text-dim);margin-bottom:14px;}
h1{font-family:'Cinzel',serif;font-weight:900;font-size:clamp(1.7rem,4.5vw,3.2rem);background:linear-gradient(135deg,#d0b8f5,#a87be8 38%,#c0a0f0 68%,#f0e8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.tagline{margin-top:10px;font-size:.95rem;color:var(--text-dim);font-style:italic;}
.divider{height:1px;background:var(--gold-dim);max-width:300px;margin:20px auto;}
.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 20px 20px;max-width:700px;margin:0 auto;}
.filter-btn{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.14em;text-transform:uppercase;padding:6px 14px;border-radius:3px;border:1px solid var(--border);background:rgba(6,10,20,.9);color:var(--text-dim);cursor:pointer;transition:all .2s;}
.filter-btn:hover,.filter-btn.active{border-color:rgba(168,123,232,.5);color:var(--purple);background:rgba(168,123,232,.07);}
.filter-btn.active{box-shadow:0 0 12px rgba(168,123,232,.12);}
/* DIFFICULTÉ */
.diff-badge{display:inline-block;font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 10px;border-radius:2px;margin-bottom:16px;}
.diff-1{background:rgba(94,196,138,.12);border:1px solid rgba(94,196,138,.4);color:#5ec48a;}
.diff-2{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.4);color:#d4a843;}
.diff-3{background:rgba(232,80,80,.1);border:1px solid rgba(232,80,80,.4);color:#e84848;}
.progress-wrap{max-width:520px;margin:0 auto 28px;text-align:center;}
.progress-text{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px;}
.progress-bar{height:2px;background:var(--gold-dim);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--purple);transition:width .4s ease;border-radius:2px;}
.stage{display:flex;justify-content:center;align-items:center;perspective:1400px;padding:8px 0 20px;}
.fc-wrap{width:420px;max-width:88vw;height:500px;position:relative;transform-style:preserve-3d;transition:transform .72s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.fc-wrap.flipped{transform:rotateY(180deg);}
.fc-wrap.no-anim{transition:none!important;}
.face{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border:1px solid var(--border);box-shadow:0 20px 60px rgba(0,0,0,.7),0 0 0 1px rgba(200,180,120,.06);overflow:hidden;}
.face-front{background:var(--card-bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 32px 70px;}
.face-front::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse at 50% 0%,rgba(168,123,232,.06) 0%,transparent 65%);pointer-events:none;}
.q-category{font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--purple);border:1px solid rgba(168,123,232,.35);padding:4px 14px;border-radius:3px;margin-bottom:12px;opacity:.9;}
.q-text{font-family:'Crimson Pro',serif;font-size:1.05rem;font-weight:600;color:var(--text);line-height:1.7;max-width:340px;}
.q-choices{margin-top:18px;display:flex;flex-direction:column;gap:8px;width:100%;}
.choice{font-size:.88rem;padding:8px 14px;border-radius:4px;border:1px solid rgba(168,123,232,.2);background:rgba(168,123,232,.05);color:rgba(232,223,196,.7);text-align:left;}
.front-footer{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 20px;border-top:1px solid var(--border);background:rgba(6,10,20,.6);}
.flip-hint{font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);}
.flip-arrow{color:var(--gold);opacity:.7;font-size:1rem;}
.face-back{transform:rotateY(180deg);background:linear-gradient(145deg,#0e0818 0%,#160c24 50%,#0c0618 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 28px;border-color:rgba(168,123,232,.25);}
.face-back::before{content:'';position:absolute;inset:0;border-radius:14px;background:radial-gradient(ellipse at 50% 20%,rgba(168,123,232,.07) 0%,transparent 65%);pointer-events:none;}
.b-category{font-size:.56rem;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);border:1px solid rgba(168,123,232,.4);padding:4px 14px;border-radius:3px;margin-bottom:16px;}
.b-answer{font-family:'Cinzel',serif;font-size:1.3rem;font-weight:900;background:linear-gradient(135deg,#d0b8f5,#a87be8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:14px;line-height:1.3;}
.b-explain{font-size:.88rem;line-height:1.75;color:rgba(232,223,196,.58);font-style:italic;max-width:310px;}
.overlay{position:absolute;inset:0;border-radius:14px;background:#000;z-index:30;opacity:0;pointer-events:none;transition:opacity 0.28s ease;}
.overlay.dark{opacity:1;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.face-front.iris{animation:fadeIn 0.35s ease forwards;}
.controls{display:flex;justify-content:center;gap:12px;margin-top:20px;flex-wrap:wrap;}
.btn{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;padding:11px 26px;border-radius:4px;border:1px solid var(--border);background:rgba(6,10,20,.9);color:var(--text-dim);cursor:pointer;transition:all .2s;}
.btn:hover{border-color:rgba(200,180,120,.5);color:var(--text);background:rgba(200,180,120,.07);}
.btn-gold{border-color:rgba(212,168,67,.6);color:var(--gold);background:rgba(212,168,67,.07);}
.btn-gold:hover{background:rgba(212,168,67,.16);box-shadow:0 0 18px rgba(212,168,67,.2);}
.btn-green{border-color:rgba(94,196,138,.5);color:#5ec48a;}
.btn-green:hover{background:rgba(94,196,138,.1);}
.btn-red{border-color:rgba(232,80,80,.5);color:#e84848;}
.btn-red:hover{background:rgba(232,80,80,.1);}
.review-row{display:flex;justify-content:center;gap:12px;margin-top:12px;flex-wrap:wrap;}
.review-label{text-align:center;margin-top:16px;font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);}
.known-bar{max-width:520px;margin:20px auto 0;display:flex;gap:20px;justify-content:center;}
.known-stat{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);}
.known-stat span{color:var(--text);font-weight:700;}
.strip{display:flex;gap:8px;overflow-x:auto;padding:12px 20px;scrollbar-width:none;}
.strip::-webkit-scrollbar{display:none;}
.thumb-log{width:52px;height:38px;border-radius:4px;border:1px solid var(--border);flex-shrink:0;opacity:.45;transition:opacity .2s;cursor:pointer;background:rgba(168,123,232,.08);display:flex;align-items:center;justify-content:center;font-size:.55rem;font-family:'Cinzel',serif;color:rgba(168,123,232,.65);text-align:center;padding:2px;}
.thumb-log:hover{opacity:.7;}
.thumb-log.cur{opacity:1;border-color:var(--purple);}
@media(max-width:600px){.fc-wrap{height:480px;}.b-answer{font-size:1.05rem;}}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<a class="back" href="/flashcards/index.html">← Flashcards</a>
<div class="content">
  <header>
    <div class="enc-label">L'Encyclopédie des Explorateurs</div>
    <h1>Flashcards Logique</h1>
    <div class="tagline">Raisonnement · Suites · Probabilités · Enigmes · Syllogismes</div>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterBy('all',this)">Tout</button>
    <button class="filter-btn" onclick="filterBy('Suites',this)">🔢 Suites</button>
    <button class="filter-btn" onclick="filterBy('Déduction',this)">🧠 Déduction</button>
    <button class="filter-btn" onclick="filterBy('Probabilités',this)">🎲 Probabilités</button>
    <button class="filter-btn" onclick="filterBy('Calcul mental',this)">⚡ Calcul rapide</button>
    <button class="filter-btn" onclick="filterBy('Enigmes',this)">🔮 Énigmes</button>
  </div>

  <div style="padding:0 20px 80px;">
    <div class="progress-wrap">
      <div class="progress-text" id="p-text">Carte 1 / 30</div>
      <div class="progress-bar"><div class="progress-fill" id="p-fill" style="width:0%"></div></div>
    </div>
    <div class="stage">
      <div class="fc-wrap" id="fc" onclick="flipCard()">
        <div class="overlay" id="overlay"></div>
        <div class="face face-front" id="front">
          <div class="q-category" id="fc-cat"></div>
          <div class="diff-badge" id="fc-diff"></div>
          <div class="q-text" id="fc-q"></div>
          <div class="q-choices" id="fc-choices"></div>
          <div class="front-footer">
            <span class="flip-arrow">↩</span>
            <span class="flip-hint">Cliquez pour révéler</span>
          </div>
        </div>
        <div class="face face-back">
          <div class="b-category" id="fc-cat2"></div>
          <div class="b-answer" id="fc-ans"></div>
          <div class="b-explain" id="fc-exp"></div>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" onclick="prevCard()">← Précédente</button>
      <button class="btn btn-gold" onclick="nextCard()">Suivante →</button>
      <button class="btn" onclick="shuffleCards()">🔀 Mélanger</button>
    </div>
    <div class="review-label">Après avoir révélé la carte :</div>
    <div class="review-row">
      <button class="btn btn-green" onclick="markKnown()">✓ Trouvé !</button>
      <button class="btn btn-red" onclick="markReview()">↩ À retravailler</button>
    </div>
    <div class="known-bar">
      <div class="known-stat">Résolues : <span id="k-count">0</span></div>
      <div class="known-stat">À revoir : <span id="r-count">0</span></div>
      <div class="known-stat">Restantes : <span id="rem-count">30</span></div>
    </div>
    <div class="divider"></div>
    <div class="strip" id="strip"></div>
  </div>
</div>

<script>
// diff: 1=facile, 2=moyen, 3=difficile
const ALL_CARDS = [
// ── SUITES (7 cartes) ────────────────────────────────────────────
{id:1, cat:"Suites", diff:1, q:"Quel est le terme suivant de la suite ?\n2 — 4 — 8 — 16 — ?", ans:"32", exp:"Chaque terme est multiplié par 2. C'est une suite géométrique de raison 2."},
{id:2, cat:"Suites", diff:1, q:"Quel est le terme suivant ?\n1 — 1 — 2 — 3 — 5 — 8 — ?", ans:"13", exp:"Suite de Fibonacci : chaque terme est la somme des deux précédents. 5+8 = 13. On retrouve cette suite dans la nature (spirales, coquilles...)."},
{id:3, cat:"Suites", diff:2, q:"Quel est le terme manquant ?\n3 — 6 — 11 — 18 — 27 — ?", ans:"38", exp:"Les différences successives sont +3, +5, +7, +9, +11. C'est une suite de différences croissantes impaires. 27+11 = 38."},
{id:4, cat:"Suites", diff:2, q:"Trouvez le terme suivant :\n1 — 4 — 9 — 16 — 25 — ?", ans:"36", exp:"Ce sont les carrés des entiers : 1²=1, 2²=4, 3²=9, 4²=16, 5²=25, 6²=36."},
{id:5, cat:"Suites", diff:2, q:"Quel est le terme manquant ?\nA — C — F — J — ?", ans:"O", exp:"Les écarts en positions alphabétiques sont +2, +3, +4, +5. A(1)+2=C(3)+3=F(6)+4=J(10)+5=O(15)."},
{id:6, cat:"Suites", diff:3, q:"Trouvez le terme suivant :\n2 — 3 — 5 — 7 — 11 — 13 — ?", ans:"17", exp:"Ce sont les nombres premiers dans l'ordre. Après 13, le prochain nombre premier est 17."},
{id:7, cat:"Suites", diff:3, q:"Quel est le terme manquant ?\n1 — 8 — 27 — 64 — ?", ans:"125", exp:"Ce sont les cubes des entiers : 1³=1, 2³=8, 3³=27, 4³=64, 5³=125."},

// ── DÉDUCTION (7 cartes) ─────────────────────────────────────────
{id:8, cat:"Déduction", diff:1, q:"Tous les chats sont des mammifères. Félix est un chat. Conclusion ?", ans:"Félix est un mammifère.", exp:"C'est un syllogisme classique. Si tous les A sont B, et X est A, alors X est B. La conclusion est nécessairement vraie."},
{id:9, cat:"Déduction", diff:2, q:"Dans une famille de 4 enfants, il y a au moins 2 filles. Anna est l'aînée. Bastien est plus jeune qu'Anna mais plus vieux que Camille. Camille n'est pas la cadette. Qui est le cadet ?", ans:"Le 4e enfant (inconnu).", exp:"Ordre : Anna > Bastien > Camille > X. Camille n'est pas la cadette donc il existe un enfant plus jeune qu'elle."},
{id:10, cat:"Déduction", diff:2, q:"Si je mens, je dis que je mens. Si je dis la vérité, je dis que je ne mens pas. Je vous dis : 'Je mens.' Que suis-je ?", ans:"C'est un paradoxe — la phrase est indécidable.", exp:"C'est le paradoxe du Crétois de Epiménide. Si je mens en disant 'je mens', alors je dis la vérité, ce qui contredit l'énoncé. Indécidable logiquement."},
{id:11, cat:"Déduction", diff:2, q:"3 boîtes : une contient 2 pommes, une contient 2 oranges, une contient 1 pomme et 1 orange. Toutes les étiquettes sont erronées. Vous tirez 1 fruit de la boîte 'Mixte'. Comment identifier toutes les boîtes ?", ans:"Si vous tirez une pomme de 'Mixte' : c'est la boîte Pommes. 'Pommes' (fausse étiquette) contient Oranges. 'Oranges' est la Mixte.", exp:"Clé : toutes les étiquettes sont fausses. La boîte 'Mixte' est soit Pommes soit Oranges. Un seul fruit suffit pour tout déduire par élimination."},
{id:12, cat:"Déduction", diff:1, q:"Marie est plus grande que Sophie. Sophie est plus grande que Julie. Qui est la plus petite ?", ans:"Julie.", exp:"Relation transitive : Marie > Sophie > Julie. Julie est donc la plus petite des trois."},
{id:13, cat:"Déduction", diff:3, q:"5 maisons de 5 couleurs. 5 nationalités. 5 boissons. 5 animaux. L'Anglais vit dans la maison rouge. Qui boit de l'eau dans l'énigme d'Einstein ?", ans:"L'Allemand.", exp:"L'énigme d'Einstein (ou Zebra puzzle) se résout par élimination. Einstein affirmait que 2% de la population pouvait la résoudre. L'Allemand boit de l'eau et possède le poisson."},
{id:14, cat:"Déduction", diff:2, q:"Un père a 30 ans de plus que son fils. Dans 5 ans, il aura 3 fois l'âge de son fils. Quel âge a le fils aujourd'hui ?", ans:"10 ans.", exp:"Fils = x, Père = x+30. Dans 5 ans : x+30+5 = 3(x+5) → x+35 = 3x+15 → 20 = 2x → x=10."},

// ── PROBABILITÉS (5 cartes) ───────────────────────────────────────
{id:15, cat:"Probabilités", diff:1, q:"Je lance un dé à 6 faces. Quelle est la probabilité d'obtenir un 6 ?", ans:"1/6 ≈ 16,7%", exp:"Le dé a 6 faces équiprobables. 1 seule face donne 6. P(6) = 1/6."},
{id:16, cat:"Probabilités", diff:2, q:"Je tire une carte dans un jeu de 52 cartes. Quelle est la probabilité de tirer un as ?", ans:"4/52 = 1/13 ≈ 7,7%", exp:"Il y a 4 as dans un jeu de 52 cartes (un par couleur). P(as) = 4/52 = 1/13."},
{id:17, cat:"Probabilités", diff:2, q:"Je lance 2 pièces. Quelle est la probabilité d'obtenir 2 faces ?", ans:"1/4 = 25%", exp:"4 résultats possibles : FF, FP, PF, PP. 1 seul favorable (FF). P = 1/4. Les lancers sont indépendants."},
{id:18, cat:"Probabilités", diff:3, q:"Dans un groupe de 23 personnes, quelle est la probabilité qu'au moins 2 personnes partagent la même date d'anniversaire ?", ans:"Plus de 50% !", exp:"C'est le paradoxe des anniversaires. À 23 personnes : P ≈ 50,7%. À 70 personnes : P ≈ 99,9%. Contre-intuitif mais mathématiquement prouvé."},
{id:19, cat:"Probabilités", diff:3, q:"Le problème de Monty Hall : vous choisissez une porte sur 3. L'animateur ouvre une porte perdante. Faut-il changer de porte ?", ans:"Oui ! Changer donne 2/3 de chances de gagner.", exp:"Si vous gardez votre porte : P = 1/3. Si vous changez : P = 2/3. L'animateur qui sait apporte une information. Vérifiable par simulation."},

// ── CALCUL MENTAL (5 cartes) ──────────────────────────────────────
{id:20, cat:"Calcul mental", diff:1, q:"Combien font 17 × 13 ?", ans:"221", exp:"17 × 13 = 17 × 10 + 17 × 3 = 170 + 51 = 221. Ou (15+2)(15-2) = 15²-4 = 225-4 = 221."},
{id:21, cat:"Calcul mental", diff:1, q:"Un article coûte 80€. Avec -25% de remise, combien coûte-t-il ?", ans:"60€", exp:"25% de 80 = 20. 80 - 20 = 60€. Ou : 80 × 0,75 = 60€."},
{id:22, cat:"Calcul mental", diff:2, q:"Vous gagnez 1 centime le 1er jour, 2 centimes le 2e, 4 le 3e, 8 le 4e... Combien au 30e jour ?", ans:"5 368 709,12€ (soit plus de 5 millions !)", exp:"2^29 centimes = 536 870 912 centimes ≈ 5,4 millions €. C'est la puissance de la croissance exponentielle."},
{id:23, cat:"Calcul mental", diff:2, q:"Un train de 200m roule à 60 km/h. Combien de temps pour traverser un tunnel de 1000m ?", ans:"72 secondes.", exp:"Distance totale = 200+1000 = 1200m. Vitesse = 60km/h = 16,67 m/s. Temps = 1200/16,67 ≈ 72 secondes."},
{id:24, cat:"Calcul mental", diff:3, q:"Combien de zéros y a-t-il à la fin de 100! (100 factorielle) ?", ans:"24 zéros.", exp:"Chaque zéro vient d'un facteur 10 = 2×5. On compte les facteurs 5 : ⌊100/5⌋+⌊100/25⌋ = 20+4 = 24. Les facteurs 2 sont toujours plus nombreux."},

// ── ÉNIGMES (6 cartes) ───────────────────────────────────────────
{id:25, cat:"Enigmes", diff:1, q:"Je parle sans bouche et entends sans oreilles. Je n'ai pas de corps mais je prends vie avec le vent. Qui suis-je ?", ans:"L'écho.", exp:"L'écho est le reflet du son sur une surface. Il 'parle' (répète) sans bouche et semble 'entendre' le vent."},
{id:26, cat:"Enigmes", diff:1, q:"Un homme pousse sa voiture jusqu'à un hôtel et déclare immédiatement qu'il est en faillite. Pourquoi ?", ans:"Il joue au Monopoly.", exp:"Au Monopoly, si vous tombez sur une propriété avec un hôtel appartenant à un autre joueur, vous payez un loyer très élevé — souvent ruineux."},
{id:27, cat:"Enigmes", diff:2, q:"Vous avez 2 cordes qui brûlent chacune exactement en 1 heure, mais de façon irrégulière. Comment mesurer 45 minutes ?", ans:"Allumez la corde 1 des 2 côtés + la corde 2 d'un côté. Quand la corde 1 s'éteint (30 min), allumez l'autre bout de la corde 2.", exp:"Corde 1 par les deux bouts = 30 min. À 30 min, il reste 30 min sur corde 2 → allumer l'autre bout → 15 min de plus. Total : 45 min."},
{id:28, cat:"Enigmes", diff:2, q:"Un fermier a 17 moutons. Tous sauf 9 meurent. Combien lui en reste-t-il ?", ans:"9 moutons.", exp:"'Tous sauf 9' signifie que 9 survivent. C'est un piège de lecture : on tend à calculer 17-9=8, mais la phrase dit explicitement que 9 restent."},
{id:29, cat:"Enigmes", diff:3, q:"Vous êtes dans une pièce avec 3 interrupteurs. L'un allume une ampoule dans la pièce à côté. Vous ne pouvez y aller qu'une fois. Comment trouver lequel ?", ans:"Allumez le 1er longtemps, puis éteignez. Allumez le 2e. Allez voir : chaud=1er, allumé=2e, froid éteint=3e.", exp:"L'astuce : utiliser la chaleur de l'ampoule comme information supplémentaire. Les ampoules à incandescence chauffent quand elles sont allumées."},
{id:30, cat:"Enigmes", diff:3, q:"Trois dieux — Vrai, Faux, Aléatoire — répondent en leur langue (ja/da = oui/non, mais vous ignorez lequel). Que demandez-vous pour identifier chacun en 3 questions ?", ans:"'Si je vous demandais si ja signifie oui, diriez-vous ja ?' Neutralise les mensonges.", exp:"C'est le problème du 'Plus difficile problème de logique du monde' (George Boolos, 1996). La question auto-référentielle force les réponses cohérentes même du menteur."},
];

let deck=[], idx=0, flipped=false, knownSet=new Set(), reviewSet=new Set();

const DIFF_LABELS = {1:'⭐ Facile', 2:'⭐⭐ Moyen', 3:'⭐⭐⭐ Difficile'};
const DIFF_CLASSES = {1:'diff-1', 2:'diff-2', 3:'diff-3'};

function filterBy(cat, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  deck = cat==='all' ? shuffle([...ALL_CARDS]) : shuffle(ALL_CARDS.filter(c=>c.cat===cat));
  idx=0; flipped=false; knownSet.clear(); reviewSet.clear();
  updateCounters(); buildStrip(); advance();
}
function loadContent(){
  const card=deck[idx];
  document.getElementById('fc-cat').textContent  = card.cat;
  document.getElementById('fc-cat2').textContent = card.cat;
  document.getElementById('fc-q').textContent    = card.q;
  document.getElementById('fc-ans').textContent  = card.ans;
  document.getElementById('fc-exp').textContent  = card.exp||'';
  // Difficulté
  const diffEl = document.getElementById('fc-diff');
  diffEl.textContent = DIFF_LABELS[card.diff]||'';
  diffEl.className = 'diff-badge ' + (DIFF_CLASSES[card.diff]||'');
  // Choix (si présents)
  const choicesEl = document.getElementById('fc-choices');
  choicesEl.innerHTML = '';
  if(card.choices){
    card.choices.forEach(c=>{
      const d=document.createElement('div');
      d.className='choice'; d.textContent=c;
      choicesEl.appendChild(d);
    });
  }
  const pct=(idx/deck.length)*100;
  document.getElementById('p-text').textContent=`Carte ${idx+1} / ${deck.length}`;
  document.getElementById('p-fill').style.width=pct+'%';
  document.querySelectorAll('#strip .thumb-log').forEach((el,i)=>el.classList.toggle('cur',i===idx));
}
function advance(){
  const ov=document.getElementById('overlay'),fr=document.getElementById('front'),wrap=document.getElementById('fc');
  ov.classList.add('dark');
  setTimeout(()=>{
    wrap.classList.add('no-anim'); wrap.classList.remove('flipped'); flipped=false; fr.classList.remove('iris');
    loadContent();
    requestAnimationFrame(()=>requestAnimationFrame(()=>{wrap.classList.remove('no-anim');ov.classList.remove('dark');fr.classList.add('iris');}));
  },280);
}
function flipCard(){if(flipped){idx=(idx+1)%deck.length;advance();}else{flipped=true;document.getElementById('fc').classList.add('flipped');}}
function nextCard(){idx=(idx+1)%deck.length;advance();}
function prevCard(){idx=(idx-1+deck.length)%deck.length;advance();}
function shuffleCards(){deck=shuffle([...deck]);idx=0;flipped=false;knownSet.clear();reviewSet.clear();updateCounters();buildStrip();advance();}
function markKnown(){knownSet.add(deck[idx].id);reviewSet.delete(deck[idx].id);updateCounters();idx=(idx+1)%deck.length;advance();}
function markReview(){reviewSet.add(deck[idx].id);knownSet.delete(deck[idx].id);const c=deck.splice(idx,1)[0];deck.splice(Math.min(idx+3,deck.length),0,c);updateCounters();if(idx>=deck.length)idx=0;advance();}
function updateCounters(){document.getElementById('k-count').textContent=knownSet.size;document.getElementById('r-count').textContent=reviewSet.size;document.getElementById('rem-count').textContent=deck.length-knownSet.size-reviewSet.size;}
function buildStrip(){
  const strip=document.getElementById('strip');strip.innerHTML='';
  deck.forEach((card,i)=>{
    const d=document.createElement('div');
    d.className='thumb-log'+(i===0?' cur':'');
    d.textContent='★'.repeat(card.diff);
    d.onclick=()=>{idx=i;advance();};
    d.title=card.q.slice(0,40);
    strip.appendChild(d);
  });
}
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextCard();}
  if(e.key==='ArrowLeft'){e.preventDefault();prevCard();}
  if(e.key==='Enter'){e.preventDefault();flipCard();}
  if(e.key==='k'||e.key==='K')markKnown();
  if(e.key==='r'||e.key==='R')markReview();
});
(function(){
  const c=document.getElementById('stars-canvas'),ctx=c.getContext('2d');let stars=[];
  function resize(){c.width=innerWidth;c.height=innerHeight;}
  function init(){resize();stars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.2+.15,a:Math.random()*.5+.08,speed:Math.random()*.0004+.00015,phase:Math.random()*Math.PI*2}));}
  let t=0;function draw(){t++;ctx.clearRect(0,0,c.width,c.height);for(const s of stars){const f=s.a*(.65+.35*Math.sin(t*s.speed*80+s.phase));ctx.beginPath();ctx.arc(s.x*c.width,s.y*c.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(210,190,255,${f})`;ctx.fill();}requestAnimationFrame(draw);}
  addEventListener('resize',init);init();draw();
})();
deck=shuffle([...ALL_CARDS]);buildStrip();loadContent();
</script>
</body>
